services:
    postgres:
        image: postgres:18.3
        restart: always
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
             - postgres-data:/var/lib/postgresql/data
    seq:
      container_name: seq
      image: datalust/seq:latest
      environment:
        ACCEPT_EULA: "Y"
        SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
      ports:
        - "8081:80"
        - "5341:5341"
      
      volumes:
        - seq-data:/data
      restart: always

volumes:
    postgres-data:        
    seq-data: